name: Android checks

on:
  push:
    branches: [main, "preview/**", "fix/**"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Set up Java 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Run tests, lint, and debug/preview/release builds
        run: ./gradlew test lint detekt assembleDebug assemblePreview assembleRelease --stacktrace
      - name: Verify APK permissions
        run: |
          tools/check_apk_permissions.sh \
            app/build/outputs/apk/debug/app-debug.apk \
            app/build/outputs/apk/preview/app-preview.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
