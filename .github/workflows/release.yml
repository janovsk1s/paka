name: Tagged release

# Runs the full check suite for a version tag and retains an unsigned APK for
# comparison. Release creation stays manual so checks finish first and the
# published release is authored by the owner's GitHub account.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Set up Java 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Verify tag and manifest metadata agree
        run: sh tools/check_release_metadata.sh "$GITHUB_REF_NAME"
      - name: Run tests, lint, and all builds
        run: ./gradlew test lint detekt assembleDebug assemblePreview assembleRelease --stacktrace
      - name: Verify APK permissions
        run: |
          tools/check_apk_permissions.sh \
            app/build/outputs/apk/debug/app-debug.apk \
            app/build/outputs/apk/preview/app-preview.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
      - name: Upload unsigned release APK for comparison
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paka-${{ github.ref_name }}-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
      - name: Record owner release handoff
        run: |
          {
            echo "## Tagged release checks passed"
            echo
            echo "Unsigned comparison APK: paka-${GITHUB_REF_NAME}-unsigned"
            echo
            echo "The owner can now build and verify the signed APK,"
            echo "then create and publish the GitHub release manually."
          } >> "$GITHUB_STEP_SUMMARY"
