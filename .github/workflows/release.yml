name: Tagged release

# Runs the full check suite for a version tag and opens a draft GitHub
# release. Signing stays local: build and attach the release-signed APK
# from the machine that holds the keystore, then publish the draft.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Set up Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Run tests, lint, and all builds
        run: ./gradlew test lint detekt assembleDebug assemblePreview assembleRelease --stacktrace
      - name: Upload unsigned release APK for comparison
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: paka-${{ github.ref_name }}-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
      - name: Open draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; leaving it untouched."
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --verify-tag \
              --title "Paka ${GITHUB_REF_NAME#v}" \
              --generate-notes
          fi
