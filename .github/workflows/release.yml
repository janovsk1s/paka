name: Tagged release

# Runs the full check suite for a version tag and opens a draft GitHub
# release. Signing stays local: build and attach the release-signed APK
# from the machine that holds the keystore, then publish the draft.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Set up Java 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Run tests, lint, and all builds
        run: ./gradlew test lint detekt assembleDebug assemblePreview assembleRelease --stacktrace
      - name: Upload unsigned release APK for comparison
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paka-${{ github.ref_name }}-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
      - name: Open draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; leaving it untouched."
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --verify-tag \
              --title "Paka ${GITHUB_REF_NAME#v}" \
              --generate-notes
          fi
