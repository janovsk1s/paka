# Compose composables are PascalCase, screen-sized, and full of layout
# dimensions by design; these rules stay active for ordinary functions.
naming:
  FunctionNaming:
    ignoreAnnotated: ['Composable']

complexity:
  LongMethod:
    ignoreAnnotated: ['Composable']
  LongParameterList:
    ignoreAnnotated: ['Composable']
  CyclomaticComplexMethod:
    ignoreAnnotated: ['Composable']

style:
  ReturnCount:
    ignoreAnnotated: ['Composable']
    excludeGuardClauses: true
  MagicNumber:
    ignoreAnnotated: ['Composable']
